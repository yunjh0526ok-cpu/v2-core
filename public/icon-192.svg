<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a35"/>
      <stop offset="100%" style="stop-color:#0a0f25"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M96 24 L148 46 L148 96 C148 128 120 152 96 164 C72 152 44 128 44 96 L44 46 Z"
    fill="none" stroke="url(#shield)" stroke-width="6" stroke-linejoin="round"/>
  <!-- L letter -->
  <text x="72" y="118" font-family="'Arial Black', Arial, sans-serif"
    font-weight="900" font-size="60" fill="url(#shield)" letter-spacing="-2">L</text>
  <!-- Scan line glow -->
  <rect x="44" y="104" width="104" height="2" rx="1" fill="#38bdf8" opacity="0.35"/>
</svg>
